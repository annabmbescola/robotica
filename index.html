<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diário de Robótica</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #e8dcc7, #cbb89d);
}

#home {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  text-align: center;
  padding: 20px;
}

.descricao {
  max-width: 600px;
  font-size: 18px;
  color: #333;
  background: rgba(255,255,255,0.6);
  padding: 15px;
  border-radius: 20px;
  font-family: "Times New Roman", Times, serif;
}

.clique {
  font-size: 22px;
  font-weight: bold;
  color: #5a3722;
}

.seta {
  font-size: 30px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

.caderno {
  width: 260px;
  height: 340px;
  background: linear-gradient(145deg, #6b3e26, #8b5e3c);
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 12px 12px 30px rgba(0,0,0,0.5);
  position: relative;
  transition: transform 0.3s;
}

.caderno:hover {
  transform: scale(1.05);
}

.caderno::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 20px;
  height: 100%;
  background: #5a3722;
  border-top-left-radius: 15px;
  border-bottom-left-radius: 15px;
}

.caderno::after {
  content: "Diário de Robótica";
  position: absolute;
  top: 50%;
  left: 55%;
  transform: translate(-50%, -50%);
  color: #fdf5e6;
  font-size: 26px;
  text-align: center;
  padding: 10px;
  line-height: 1.3;
  font-family: 'Pacifico', cursive;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

#diario {
  display: none;
  width: 100%;
  height: 100vh;
  background: #fdfaf3;
  padding: 40px;
  position: relative;
}

.pagina {
  width: 100%;
  height: 100%;
  background: #fffdf7;
  border-radius: 10px;
  padding: 30px;
  padding-right: 40px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
  font-size: 20px;
  line-height: 1.6;
  overflow-y: auto; 
}

.pagina h2 {
  margin-bottom: 10px;
}

.pagina h3 {
  margin-top: 15px;
  color: #5a3722;
}

.pagina ul {
  margin-left: 20px;
  margin-top: 10px;
}

.btn {
  position: absolute;
  bottom: 20px;
  font-size: 24px;
  cursor: pointer;
  background: #ddd;
  padding: 10px 15px;
  border-radius: 8px;
}

#voltar { left: 20px; }
#anterior { right: 80px; }
#proximo { right: 20px; }

</style>
</head>

<body>

<div id="home">

  <div class="descricao">
    Este diário é referente às aulas de robótica.<br><br>
    Aqui estão registrados experimentos, práticas, aprendizados e fotos dos projetos desenvolvidos ao longo das aulas.
  </div>

  <div class="clique">Clique aqui</div>
  <div class="seta">⬇</div>

  <div class="caderno" onclick="abrirDiario()"></div>

</div>

<div id="diario">
  <div class="pagina" id="conteudo"></div>

  <div id="voltar" class="btn" onclick="voltar()">⬅</div>
  <div id="anterior" class="btn" onclick="paginaAnterior()">◀</div>
  <div id="proximo" class="btn" onclick="proximaPagina()">▶</div>
</div>

<script>
let paginaAtual = 0;

const paginas = [

`
<h2>Aula 1</h2>

<p>
Hoje a aula de robótica foi daquelas que fazem a gente olhar para a rua de um jeito totalmente diferente. O desafio era investigar uma questão central: como a automação pode resolver o problema de cruzamentos ineficientes? Para responder a isso, montamos um semáforo inteligente. Antes de começar a lógica, organizamos a bancada com o material necessário: um Arduino Uno como base, uma protoboard, LEDs (nas cores vermelho, amarelo e verde), resistores de 220Ω para proteger os componentes, um sensor IR (infravermelho) para a detecção de presença e diversos jumpers para fazer as conexões.

A montagem foi um exercício de paciência e técnica. Espetamos os LEDs na protoboard e conectamos cada um a um pino digital do Arduino, sempre intercalando com os resistores para garantir que a corrente elétrica estivesse correta. O diferencial foi o sensor IR: ele funcionava como o olho do sistema, posicionado estrategicamente para detectar quando um "veículo" se aproximava da via secundária. Programamos o código para que o sinal permanecesse verde por padrão, alterando a fase apenas quando o sensor captasse a reflexão da luz infravermelha em um objeto, fechando o circuito de informação.

Ao coletar os dados durante os testes, algo me chamou muito a atenção: a sensibilidade do sensor. Ele detectava objetos a poucos centímetros, mas percebemos que a iluminação da sala interferia nos resultados, gerando alguns acionamentos por erro. Isso me fez refletir sobre como a nossa realidade é complexa. Na física, estudamos o Movimento Retilíneo Uniforme (MRU) e o Uniformemente Variado (MRUV), e ali, no protótipo, vi isso na prática. Para o semáforo ser seguro, o tempo do sinal amarelo precisa estar em perfeita sintonia com a desaceleração dos carros (a < 0). Se o código não respeitar o tempo necessário para um veículo frear, a automação causa um acidente em vez de evitá-lo.

Fazendo uma avaliação crítica, o projeto faz total sentido lógico, mas o experimento tem suas limitações. Os materiais que usamos, como o sensor IR simples, sofrem com interferências externas (como a luz solar), o que em uma escala real de mobilidade urbana seria um perigo. Além disso, a incerteza sobre o alcance do sensor nos mostra que, para cidades inteligentes de verdade, precisaríamos de componentes muito mais robustos, como sensores ultrassônicos ou câmeras com inteligência artificial.

No fim das contas, saí da aula pensando na mobilidade urbana. Esse pequeno emaranhado de fios e componentes é a prova de que cidades fluidas dependem de dados precisos. Entender essa relação entre eletrônica, física e engenharia de tráfego me ajudou a compreender que a tecnologia pode, sim, reduzir poluição e estresse, desde que a gente saiba lidar com as variáveis e as incertezas do mundo real. Mal posso esperar pelo próximo nível dessa montagem!
</p>


<img src="semaforo.jpg" style="width:100%; margin-top:15px;">
`,

`
<h2>Aula 2</h2>

<p>IMAGENS GERADAS COM IA</p>

<img src="imagem1.jpg" style="width:100%; margin-top:15px;">
<img src="imagem2.jpg" style="width:100%; margin-top:15px;">
<img src="imagem3.jpg" style="width:100%; margin-top:15px;">
<img src="imagem4.jpg" style="width:100%; margin-top:15px;">
<img src="imagem5.jpg" style="width:100%; margin-top:15px;">

<p>
As imagens representam as etapas do desenvolvimento do projeto e a montagem dos circuitos realizados em sala.
</p>
`,

`
<h2>Aula 3</h2>

<p>
Hoje eu e minhas amigas ficamos refletindo sobre a inteligência artificial, e surgiu a seguinte questão: 
"A IA é eficiente a ser usada na criação de um projeto de robótica?". 
Diante da situação, pesquisamos os malefícios e os benefícios para isso se tornar uma prática.
</p>

<ul>
<li>
<b>VANTAGENS:</b> Integrar a inteligência artificial em um projeto de robótica traz várias vantagens práticas e claras. 
A principal é a autonomia, já que o robô passa a tomar decisões sem depender totalmente de comandos humanos. 
Além disso, há um ganho importante em precisão e eficiência, pois a IA consegue analisar dados em tempo real e ajustar ações para melhorar o desempenho.

Outro benefício relevante é a capacidade de aprendizado: com técnicas de aprendizado de máquina, o robô pode evoluir com o tempo, corrigindo erros e se adaptando a novas situações. 
Isso também permite maior flexibilidade, já que ele pode atuar em ambientes diferentes sem precisar ser totalmente reprogramado.

A IA também contribui para a automação de tarefas complexas ou repetitivas, reduzindo esforço humano e aumentando a produtividade. 
Por fim, há melhorias na segurança, pois robôs inteligentes podem identificar riscos e evitar acidentes com mais facilidade.

Em resumo, a IA torna os projetos de robótica mais inteligentes, adaptáveis e eficientes, ampliando muito suas possibilidades de uso.
</li>
</ul>

<ul>
<li>
<b>DESVANTAGENS:</b> A inteligência artificial é muito útil no nosso dia a dia e na criação de projetos, porém, em algumas situações ela não é eficiente para uso. 
Portanto, existem malefícios gerados através dela.

A IA acelera a criação, mas o uso sem revisão em robótica traz riscos graves. Primeiro, no hardware (físico), ela pode sugerir ligações elétricas erradas ou componentes incompatíveis, o que causa curto-circuitos e danos físicos ao equipamento.

No software, o código gerado pode ser instável ou conter bugs. Isso resulta em comportamentos imprevisíveis do robô, gerando riscos de acidentes e ferimentos, já que a máquina interage com o mundo real.

Por fim, há o prejuízo intelectual. A dependência da IA pode dificultar o aprendizado da lógica fundamental, tornando mais difícil identificar e consertar erros manualmente quando a ferramenta falha.

Para segurança, a IA deve ser usada como assistente, não como decisão final.
</li>
</ul>
`,
`
<h2>Aula 4</h2> <p> Hoje pesquisamos sobre os benefícios e os malefícios do uso da inteligência artificial em diferentes áreas da sociedade, como agricultura, defesa e segurança, serviços públicos e cidadania. Durante a pesquisa, analisamos como a IA pode contribuir para aumentar a eficiência e melhorar a qualidade de vida, mas também identificamos riscos e impactos negativos que precisam ser considerados. </p> <ul> <li> <b>BENEFÍCIOS:</b> O uso da inteligência artificial traz diversas vantagens para diferentes setores. Na agricultura, a IA ajuda na identificação precoce de pragas e doenças, melhora a produtividade e reduz desperdícios por meio da aplicação precisa de água e fertilizantes. Além disso, previsões climáticas mais assertivas auxiliam no planejamento do plantio e da colheita.

Na área de defesa e segurança, a IA contribui para sistemas de vigilância inteligente, reconhecimento de padrões suspeitos e proteção automática contra ataques virtuais.
Ela também auxilia na manutenção preditiva de veículos e equipamentos, aumentando a eficiência e a prontidão operacional.

Nos serviços públicos, a inteligência artificial agiliza processos burocráticos, melhora o atendimento através de chatbots e otimiza o fluxo do trânsito e da iluminação pública.
Na saúde, pode colaborar para diagnósticos mais rápidos e uma gestão mais eficiente de filas e atendimentos hospitalares.

Já na cidadania, a IA promove acessibilidade por meio de ferramentas de tradução em tempo real e leitura para deficientes visuais.
Também facilita o acesso a dados públicos e auxilia no combate à corrupção através da análise de informações e identificação de irregularidades.

Em resumo, a inteligência artificial pode tornar diversos setores mais rápidos, eficientes e acessíveis, ampliando as possibilidades de desenvolvimento tecnológico e social.

</li> </ul> <ul> <li> <b>DESVANTAGENS:</b> Apesar dos benefícios, o uso da inteligência artificial também pode gerar problemas e desafios importantes. Na agricultura, o alto custo das tecnologias pode excluir pequenos produtores, favorecendo apenas grandes propriedades. Além disso, o incentivo às monoculturas pode reduzir a biodiversidade, enquanto a automação excessiva pode causar desemprego no campo.

Na área de segurança e defesa, existem riscos relacionados à autonomia de armas inteligentes e sistemas automáticos de decisão, que podem agir sem supervisão humana.
Outro problema é o viés em sistemas de reconhecimento facial, que podem cometer erros e causar injustiças, além do risco de conflitos serem ampliados pela velocidade das decisões automatizadas.

Nos serviços públicos, a IA pode apresentar falhas em algoritmos que negam benefícios ou atendimentos de forma injusta.
Também pode ocorrer desumanização no atendimento, dificultando a resolução de casos específicos, além de riscos relacionados ao vazamento de dados pessoais.

Na cidadania, o uso excessivo da inteligência artificial pode gerar vigilância constante, redução da privacidade e manipulação de opiniões através da desinformação e das bolhas digitais.
Outro problema é a exclusão digital, já que parte da população pode não ter acesso adequado às tecnologias.

Portanto, apesar de ser uma ferramenta muito útil, a inteligência artificial deve ser utilizada com responsabilidade, ética e supervisão humana, garantindo segurança e equilíbrio em sua aplicação.

</li> </ul> <p> Após pesquisar sobre os benefícios e os malefícios do uso da IA na agricultura, segurança e defesa, serviços públicos e cidadania, voltamos à página 209 do livro. Nela, observamos um esquema sobre os tipos de aprendizado da inteligência artificial: o aprendizado supervisionado, o não supervisionado e o aprendizado por reforço. O esquema está logo abaixo. </p> <img src="esquema.jpg" style="width:100%; margin-top:20px;"> <p> Em conclusão, a pesquisa mostrou que a inteligência artificial possui impactos positivos e negativos em diferentes áreas da sociedade. Na agricultura, por exemplo, ela aumenta a produtividade e melhora a eficiência no uso de recursos, mas também pode gerar desigualdades e dependência tecnológica. Esses resultados se relacionam com os estudos da Física, principalmente na otimização de processos e no desenvolvimento tecnológico aplicado ao cotidiano.

Além disso, compreendemos que o aprendizado supervisionado utiliza dados rotulados para ensinar os sistemas, o aprendizado não supervisionado identifica padrões sem rótulos e o aprendizado por reforço funciona por tentativa e erro.
Esses diferentes modelos se complementam e são fundamentais para o avanço da inteligência artificial em diversas áreas da sociedade.

</p>



`
];

function abrirDiario() {
  document.getElementById("home").style.display = "none";
  document.getElementById("diario").style.display = "block";
  mostrarPagina();
}

function voltar() {
  document.getElementById("diario").style.display = "none";
  document.getElementById("home").style.display = "flex";
}

function mostrarPagina() {
  document.getElementById("conteudo").innerHTML = paginas[paginaAtual];
}

function proximaPagina() {
  if (paginaAtual < paginas.length - 1) {
    paginaAtual++;
    mostrarPagina();
  }
}

function paginaAnterior() {
  if (paginaAtual > 0) {
    paginaAtual--;
    mostrarPagina();
  }
}
</script>

</body>
</html>
