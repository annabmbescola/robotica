<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diário de Robótica</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #e8dcc7, #cbb89d);
}

#home {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  text-align: center;
  padding: 20px;
}

.descricao {
  max-width: 600px;
  font-size: 18px;
  color: #333;
  background: rgba(255,255,255,0.6);
  padding: 15px;
  border-radius: 20px;
  font-family: "Times New Roman", Times, serif;
}

.clique {
  font-size: 22px;
  font-weight: bold;
  color: #5a3722;
}

.seta {
  font-size: 30px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

.caderno {
  width: 260px;
  height: 340px;
  background: linear-gradient(145deg, #6b3e26, #8b5e3c);
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 12px 12px 30px rgba(0,0,0,0.5);
  position: relative;
  transition: transform 0.3s;
}

.caderno:hover {
  transform: scale(1.05);
}

.caderno::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 20px;
  height: 100%;
  background: #5a3722;
}

.caderno::after {
  content: "Diário de Robótica";
  position: absolute;
  top: 50%;
  left: 55%;
  transform: translate(-50%, -50%);
  color: #fdf5e6;
  font-size: 26px;
  text-align: center;
  font-family: 'Pacifico', cursive;
}

#diario {
  display: none;
  width: 100%;
  height: 100vh;
  background: #fdfaf3;
  padding: 40px;
  position: relative;
}

.pagina {
  width: 100%;
  height: 100%;
  background: #fffdf7;
  border-radius: 10px;
  padding: 30px;
  overflow-y: auto;
}

.btn {
  position: absolute;
  bottom: 20px;
  font-size: 24px;
  cursor: pointer;
  background: #ddd;
  padding: 10px;
}

#voltar { left: 20px; }
#anterior { right: 80px; }
#proximo { right: 20px; }

</style>
</head>

<body>

<div id="home">
  <div class="descricao">
    Diário de robótica
  </div>
  <div class="caderno" onclick="abrirDiario()"></div>
</div>

<div id="diario">
  <div class="pagina" id="conteudo"></div>

  <div id="voltar" class="btn" onclick="voltar()">⬅</div>
  <div id="anterior" class="btn" onclick="paginaAnterior()">◀</div>
  <div id="proximo" class="btn" onclick="proximaPagina()">▶</div>
</div>

<script>
let paginaAtual = 0;

const paginas = [

`
<h2>Dia 1</h2>

<p>Hoje a aula de robótica foi daquelas que fazem a gente olhar para a rua de um jeito totalmente diferente. O desafio era investigar uma questão central: como a automação pode resolver o problema de cruzamentos ineficientes? Para responder a isso, montamos um semáforo inteligente...</p>
`,

`
<h2>Dia 2</h2>
<p></p>
`,

`
<h2>Dia 3</h2>

<h3>Agricultura</h3>
<ul>
<li>Concentração de Renda...</li>
</ul>

<p>
apos pesquisar sobre os malefícios...
</p>

<img src="imagens/esquema.jpg" style="width:100%; margin-top:20px;">

<p>
Em conclusão, a questão investigada analisou os impactos da inteligência artificial na agricultura, evidenciando que seu uso aumenta a produtividade e a eficiência, mas também pode gerar dependência tecnológica e desigualdades entre produtores. Os dados observados fazem sentido dentro do que se estuda em Física, especialmente em relação à otimização de processos e ao uso mais eficiente dos recursos. Ainda assim, é importante considerar limitações como possíveis erros e influências externas. Essa análise também se conecta com a mobilidade urbana, já que sistemas inteligentes ajudam a organizar fluxos e melhorar o uso do espaço, contribuindo para a compreensão da realidade atual.
</p>

<p>
Por fim, no diário de estudo, entende-se que o aprendizado supervisionado utiliza dados rotulados, o não supervisionado identifica padrões sem rótulos e o aprendizado por reforço ocorre por tentativa e erro. Esses modelos, apesar de diferentes, se complementam e são fundamentais para o avanço da inteligência artificial em diversas áreas.
</p>
`

];

function abrirDiario() {
  document.getElementById("home").style.display = "none";
  document.getElementById("diario").style.display = "block";
  mostrarPagina();
}

function voltar() {
  document.getElementById("diario").style.display = "none";
  document.getElementById("home").style.display = "flex";
}

function mostrarPagina() {
  document.getElementById("conteudo").innerHTML = paginas[paginaAtual];
}

function proximaPagina() {
  if (paginaAtual < paginas.length - 1) {
    paginaAtual++;
    mostrarPagina();
  }
}

function paginaAnterior() {
  if (paginaAtual > 0) {
    paginaAtual--;
    mostrarPagina();
  }
}
</script>

</body>
</html>
