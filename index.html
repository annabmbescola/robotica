<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diário Digital</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    background: linear-gradient(135deg, #e8dcc7, #cbb89d);
  }

  /* TELA INICIAL */
  #home {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .caderno {
    width: 250px;
    height: 320px;
    background: #7b4f2c;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 10px 10px 25px rgba(0,0,0,0.4);
    position: relative;
    transition: transform 0.3s;
  }

  .caderno:hover {
    transform: scale(1.05);
  }

  .caderno::after {
    content: "📔 Meu Diário";
    color: white;
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    text-align: center;
  }

  /* DIÁRIO */
  #diario {
    display: none;
    width: 100%;
    height: 100vh;
    background: #fdfaf3;
    padding: 40px;
    position: relative;
  }

  .pagina {
    width: 100%;
    height: 100%;
    background: #fffdf7;
    border-radius: 10px;
    padding: 30px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    font-size: 20px;
    line-height: 1.6;
  }

  /* BOTÕES */
  .btn {
    position: absolute;
    bottom: 20px;
    font-size: 24px;
    cursor: pointer;
    background: #ddd;
    padding: 10px 15px;
    border-radius: 8px;
    transition: 0.2s;
  }

  .btn:hover {
    background: #bbb;
  }

  #voltar { left: 20px; }
  #anterior { right: 80px; }
  #proximo { right: 20px; }

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="caderno" onclick="abrirDiario()"></div>
</div>

<!-- DIÁRIO -->
<div id="diario">
  <div class="pagina" id="conteudo"></div>

  <div id="voltar" class="btn" onclick="voltar()">⬅</div>
  <div id="anterior" class="btn" onclick="paginaAnterior()">◀</div>
  <div id="proximo" class="btn" onclick="proximaPagina()">▶</div>
</div>

<script>
  let paginaAtual = 0;

  const paginas = [
    "Dia 1:\nHoje comecei meu diário digital 😊",
    "Dia 2:\nAprendi a deixar em tela cheia!",
    "Dia 3:\nAgora está parecendo um app de verdade 🚀"
  ];

  function abrirDiario() {
    document.getElementById("home").style.display = "none";
    document.getElementById("diario").style.display = "block";
    mostrarPagina();
  }

  function voltar() {
    document.getElementById("diario").style.display = "none";
    document.getElementById("home").style.display = "flex";
  }

  function mostrarPagina() {
    document.getElementById("conteudo").innerText = paginas[paginaAtual];
  }

  function proximaPagina() {
    if (paginaAtual < paginas.length - 1) {
      paginaAtual++;
      mostrarPagina();
    }
  }

  function paginaAnterior() {
    if (paginaAtual > 0) {
      paginaAtual--;
      mostrarPagina();
    }
  }
</script>

</body>
</html>
